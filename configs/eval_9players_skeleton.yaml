env:
  backend: rlcard
  env_id: limit-holdem
  num_players: 9

eval:
  episodes: 200
  seed: 0
  show_progress: true

# 9 seats = 9 "players" in one game.
# 所有baseline已实现，可以直接运行（部分需要预训练模型或API调用）
seats:
  - type: rule_based
    params: { tightness: 0.65, aggression: 0.35, seed: 0 }
  - type: ppo
    params: 
      algorithm: ppo
      model_path: null  # Set to path if you have a pre-trained model
      seed: 1
  - type: dqn
    params:
      algorithm: dqn
      model_path: null  # Set to path if you have a pre-trained model
      seed: 2
  - type: cfr
    params:
      game_name: leduc_poker
      iterations: 1000
      seed: 3
  - type: deep_cfr
    params:
      game_name: leduc_poker
      model_path: null  # Set to path if you have a pre-trained model
      seed: 4
  - type: llm_only
    params:
      api_url: https://api.vveai.com/v1
      api_key: ${OPENAI_API_KEY}
      model: gpt-4.1-mini
      temperature: 0.7
      seed: 5
  - type: llm_heuristic_range
    params:
      api_url: https://api.vveai.com/v1
      api_key: ${OPENAI_API_KEY}
      model: gpt-4.1-mini
      temperature: 0.7
      seed: 6
  - type: llm_static_belief
    params:
      api_url: https://api.vveai.com/v1
      api_key: ${OPENAI_API_KEY}
      model: gpt-4.1-mini
      temperature: 0.7
      seed: 7
  - type: ours
    params:
      api_url: https://api.vveai.com/v1
      api_key: ${OPENAI_API_KEY}
      model: gpt-4.1-mini
      temperature: 0.7
      max_tokens: 200
      # RL settings for prompt selection
      learning_rate: 0.1
      discount_factor: 0.9
      epsilon: 0.1
      epsilon_decay: 0.995
      epsilon_min: 0.05
      # BEGSA-aligned memory + EV-gate settings
      hand_memory_max_size: 2000
      gate_learning_rate: 0.02
      gate_ev_threshold: 0.05
      cf_rollout_hands: 128
      uncertainty_penalty_coef: 0.05
      deviation_penalty_lambda: 0.02
      ppo_clip_eps: 0.2
      ppo_epochs: 4
      ppo_gamma: 0.99
      ppo_gae_lambda: 0.95
      ppo_entropy_coef: 0.01
      ppo_value_coef: 0.5
      ppo_value_lr: 0.02
      seed: 8

output:
  root: runs/eval_9players_skeleton

